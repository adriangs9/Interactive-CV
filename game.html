<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Right Key – Formal SVG Puzzle</title>
<style>
  :root {
    --bg: #f3f4f6;
    --panel: #ffffff;
    --border-soft: #e5e7eb;
    --border-strong: #d1d5db;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --text-main: #111827;
    --text-muted: #6b7280;
    --door: #e5e7eb;
    --door-edge: #cbd5f5;
    --key-gold: #fbbf24;
    --key-silver: #9ca3af;
    --key-blue: #3b82f6;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #e5edff 0, #f3f4f6 40%, #e5e7eb 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text-main);
  }

  #game-wrapper {
    width: 780px;
    max-width: 100%;
    padding: 20px 24px 22px;
    background: var(--panel);
    border-radius: 18px;
    border: 1px solid var(--border-soft);
    box-shadow:
      0 18px 40px rgba(15, 23, 42, 0.12),
      0 0 0 1px rgba(148, 163, 184, 0.25);
    position: relative;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  #title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #4b5563;
  }

  #status-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(37, 99, 235, 0.35);
    color: #1d4ed8;
    background: linear-gradient(135deg, #eff6ff, #ffffff);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  #status-dot {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
  }

  #game-panel {
    position: relative;
    background: #f9fafb;
    border-radius: 14px;
    border: 1px solid var(--border-soft);
    padding: 16px 16px 14px;
  }

  #game-area {
    position: relative;
    width: 100%;
    height: 260px;
    background: radial-gradient(circle at top, #e5edff 0, #f9fafb 45%, #e5e7eb 100%);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  #message {
    margin-top: 10px;
    font-size: 13px;
    text-align: left;
    color: var(--text-muted);
  }

  #message span {
    color: var(--accent);
    font-weight: 500;
  }

  #hint {
    position: absolute;
    bottom: 10px;
    right: 16px;
    font-size: 11px;
    color: #6b7280;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.9;
  }

  #hint-icon {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    border: 1px solid #cbd5f5;
    background: #eff6ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #1d4ed8;
  }

  .door-body {
    fill: var(--door);
    stroke: var(--door-edge);
    stroke-width: 2;
  }

  .door-panel {
    fill: #e0e7ff;
    opacity: 0.9;
  }

  .lock-body {
    fill: #ffffff;
    stroke: #cbd5f5;
    stroke-width: 1.2;
  }

  .lock-keyhole {
    fill: #1f2937;
  }

  .key-shape {
    cursor: grab;
    filter: drop-shadow(0 3px 6px rgba(15, 23, 42, 0.25));
    transition: transform 0.15s ease-out, opacity 0.2s ease-out;
  }

  .key-shape.grabbing {
    cursor: grabbing;
    transform: scale(1.03);
  }

  .key-disabled {
    opacity: 0.35;
    cursor: not-allowed;
    filter: none;
  }

  .key-gold {
    fill: var(--key-gold);
  }

  .key-silver {
    fill: var(--key-silver);
  }

  .key-blue {
    fill: var(--key-blue);
  }

  .bg-orbit {
    fill: none;
    stroke: rgba(37, 99, 235, 0.18);
    stroke-width: 1.2;
    stroke-dasharray: 4 6;
    animation: orbit 16s linear infinite;
  }

  .bg-particle {
    fill: rgba(148, 163, 184, 0.55);
    animation: float 12s ease-in-out infinite alternate;
  }

  .bg-particle:nth-child(2) { animation-duration: 15s; }
  .bg-particle:nth-child(3) { animation-duration: 18s; }

  @keyframes orbit {
    to {
      stroke-dashoffset: -220;
    }
  }

  @keyframes float {
    from {
      transform: translateY(0px);
      opacity: 0.5;
    }
    to {
      transform: translateY(-16px);
      opacity: 0.9;
    }
  }

  .bounce {
    animation: bounce-back 0.25s ease-out;
  }

  @keyframes bounce-back {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(-8px); }
    70%  { transform: translateX(3px); }
    100% { transform: translateX(0); }
  }

  #legend {
    margin-top: 8px;
    font-size: 11px;
    color: #6b7280;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 999px;
  }

  .swatch-gold { background: var(--key-gold); }
  .swatch-silver { background: var(--key-silver); }
  .swatch-blue { background: var(--key-blue); }
</style>
</head>
<body>
<div id="game-wrapper">
