<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find the Right Key</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #ffffff;
    --border: #d1d5db;
    --accent: #2563eb;
    --text: #1f2937;
    --muted: #6b7280;
    --door: #e5e7eb;
    --door-edge: #cbd5e1;
    --key1: #9ca3af;
    --key2: #fbbf24;
    --key3: #3b82f6;
  }

  body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    color: var(--text);
  }

  #wrapper {
    width: 760px;
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }

  #game-area {
    height: 260px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: linear-gradient(to bottom, #f8fafc, #eef2f7);
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .key {
    cursor: grab;
    transition: opacity 0.2s ease-out, transform 0.15s ease-out;
  }

  .key.dragging {
    cursor: grabbing;
    transform: scale(1.05);
  }

  .key.used {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .bounce {
    animation: bounce 0.25s ease-out;
  }

  @keyframes bounce {
    0% { transform: translateX(0); }
    40% { transform: translateX(-8px); }
    70% { transform: translateX(3px); }
    100% { transform: translateX(0); }
  }

  .door-open {
    animation: openDoor 1.2s ease-out forwards;
    transform-origin: left center;
  }

  @keyframes openDoor {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(-85deg); }
  }

  #message {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
  }

  #big-success {
    position: absolute;
    top: 42%;
    left: 62%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    font-weight: 800;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.6s ease-out;
    text-align: center;
    pointer-events: none;
    line-height: 1.3;
    z-index: 0;
  }

  #big-success.show {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="wrapper">

  <div id="big-success">You found the key for your company!</div>

  <div id="game-area">
    <svg viewBox="0 0 600 260">

      <g id="door-group" transform="translate(380,40)">
        <g id="door">
          <rect x="0" y="0" width="140" height="200" rx="10"
                fill="var(--door)" stroke="var(--door-edge)" stroke-width="2"/>
          <rect x="20" y="22" width="100" height="60" rx="6" fill="#e2e8f0"/>
          <rect x="20" y="112" width="100" height="60" rx="6" fill="#e2e8f0"/>
        </g>

        <g id="lock" transform="translate(104,88)">
          <rect x="0" y="0" width="24" height="42" rx="7"
                fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
          <circle cx="12" cy="17" r="4" fill="#1f2937"/>
          <rect x="10" y="19" width="4" height="11" rx="2" fill="#1f2937"/>
        </g>
      </g>

      <g id="key1" class="key" data-key="1" transform="translate(80,70)">
        <circle cx="0" cy="0" r="16" fill="var(--key1)"/>
        <rect x="16" y="-5" width="70" height="10" rx="4" fill="var(--key1)"/>
        <rect x="60" y="5" width="10" height="9" rx="2" fill="var(--key1)"/>
        <rect x="48" y="5" width="9" height="9" rx="2" fill="var(--key1)"/>
      </g>

      <g id="key2" class="key" data-key="2" transform="translate(80,135)">
        <circle cx="0" cy="0" r="16" fill="var(--key2)"/>
        <rect x="16" y="-5" width="70" height="10" rx="4" fill="var(--key2)"/>
        <rect x="60" y="5" width="10" height="9" rx="2" fill="var(--key2)"/>
        <rect x="48" y="5" width="9" height="9" rx="2" fill="var(--key2)"/>
      </g>

      <g id="key3" class="key" data-key="3" transform="translate(80,200)">
        <circle cx="0" cy="0" r="16" fill="var(--key3)"/>
        <rect x="16" y="-5" width="70" height="10" rx="4" fill="var(--key3)"/>
        <rect x="60" y="5" width="10" height="9" rx="2" fill="var(--key3)"/>
        <rect x="48" y="5" width="9" height="9" rx="2" fill="var(--key3)"/>
      </g>

    </svg>
  </div>

  <div id="message">
    <span>Instruction:</span> Click and drag a key. Only one key will open the door.
  </div>
</div>

<script>
