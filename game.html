<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Flip Game</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
        padding-top: 40px;
    }

    h2 {
        margin-bottom: 20px;
    }

    .cards {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        width: 120px;
        height: 180px;
        perspective: 1000px;
        cursor: pointer;
    }

    .inner {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.6s;
        transform-style: preserve-3d;
    }

    .flipped {
        transform: rotateY(180deg);
    }

    .glow {
        box-shadow: 0 0 25px 8px rgba(0, 255, 0, 0.7);
        border-radius: 12px;
    }

    .front, .back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 70px;
        font-weight: bold;
        color: red;
    }

    .front {
        background: gray;
    }

    .back {
        transform: rotateY(180deg);
    }

    /* Shuffle animation */
    @keyframes shuffle {
        0% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-10px) rotate(-5deg); }
        50% { transform: translateX(10px) rotate(5deg); }
        75% { transform: translateX(-5px) rotate(-3deg); }
        100% { transform: translateX(0) rotate(0deg); }
    }

    .shuffle {
        animation: shuffle 0.3s ease-in-out infinite;
    }

    #message {
        margin-top: 30px;
        font-size: 24px;
        font-weight: bold;
        color: green;
        display: none;
    }
</style>
</head>
<body>

<h2>Select the correct card</h2>

<div class="cards">
    <div class="card" onclick="checkCard(1)">
        <div class="inner">
            <div class="front"></div>
            <div class="back" id="back1"></div>
        </div>
    </div>

    <div class="card" onclick="checkCard(2)">
        <div class="inner">
            <div class="front"></div>
            <div class="back" id="back2"></div>
        </div>
    </div>

    <div class="card" onclick="checkCard(3)">
        <div class="inner">
            <div class="front"></div>
            <div class="back" id="back3"></div>
        </div>
    </div>

    <div class="card" onclick="checkCard(4)">
        <div class="inner">
            <div class="front"></div>
            <div class="back" id="back4"></div>
        </div>
    </div>

    <div class="card" onclick="checkCard(5)">
        <div class="inner">
            <div class="front"></div>
            <div class="back" id="back5"></div>
        </div>
    </div>

    <div class="card" onclick="checkCard(6)">
        <div class="inner">
            <div class="front"></div>
            <div class="back" id="back6"></div>
        </div>
    </div>
</div>

<div id="message">You have chosen correctly</div>

<script>
    const colors = ["red", "blue", "green", "orange", "purple", "yellow"];
    const correctCard = Math.floor(Math.random() * 6) + 1;
    let alreadyChosen = false;

    // Assign colors to backs
    for (let i = 1; i <= 6; i++) {
        document.getElementById("back" + i).style.background = colors[i - 1];
    }

    // Shuffle animation on load
    const allCards = document.querySelectorAll(".inner");
    allCards.forEach(card => card.classList.add("shuffle"));

    setTimeout(() => {
        allCards.forEach(card => card.classList.remove("shuffle"));
    }, 1500);

    function checkCard(num) {
        if (alreadyChosen) return;

        const card = document.querySelectorAll(".inner")[num - 1];
        const back = document.getElementById("back" + num);

        card.classList.add("flipped");

        if (num === correctCard) {
            alreadyChosen = true;

            // Glow effect
            setTimeout(() => {
                card.classList.add("glow");
            }, 600);

            setTimeout(() => {
                document.getElementById("message").style.display = "block";
            }, 700);

            setTimeout(() => {
                window.location.href = "https://www.linkedin.com/in/adrian-garcia-3b3b26a3/";
            }, 3000);

        } else {
            // Show red X
            back.style.background = "white";
            back.textContent = "✖";

            setTimeout(() => {
                card.classList.remove("flipped");
                back.textContent = "";
                back.style.background = colors[num - 1];
            }, 1200);
        }
    }
</script>

</body>
</html>
