<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Selection Game</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
        padding-top: 40px;
    }

    h2 {
        margin-bottom: 20px;
    }

    .cards {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }

    .card {
        width: 100px;
        height: 150px;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: scale(1.1);
    }

    #message {
        margin-top: 30px;
        font-size: 22px;
        font-weight: bold;
        color: green;
        display: none;
    }
</style>
</head>
<body>

<h2>Select the correct card</h2>

<div class="cards">
    <div class="card" style="background:red" onclick="checkCard(1)"></div>
    <div class="card" style="background:blue" onclick="checkCard(2)"></div>
    <div class="card" style="background:green" onclick="checkCard(3)"></div>
    <div class="card" style="background:orange" onclick="checkCard(4)"></div>
    <div class="card" style="background:purple" onclick="checkCard(5)"></div>
    <div class="card" style="background:yellow" onclick="checkCard(6)"></div>
</div>

<div id="message">You have chosen correctly</div>

<script>
    const correctCard = Math.floor(Math.random() * 6) + 1; // Random correct card

    function checkCard(selected) {
        if (selected === correctCard) {
            document.getElementById("message").style.display = "block";

            setTimeout(() => {
                window.location.href = "https://www.linkedin.com/in/adrian-garcia-3b3b26a3/";
            }, 3000);
        } else {
            alert("Incorrect card. Try again.");
        }
    }
</script>

</body>
</html>
