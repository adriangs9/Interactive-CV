<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Flip Game</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
    padding-top: 40px;
  }

  /* INTRO SCREEN */
  #intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    opacity: 0;
    animation: fadeIn 1.5s forwards;
    z-index: 10;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  h2 {
    margin-bottom: 20px;
  }

  .cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    width: 120px;
    height: 180px;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front,
  .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    font-weight: bold;
  }

  .card-front {
    background: var(--card-color);
  }

  .card-back {
    background: white;
    transform: rotateY(180deg);
    color: red;
  }

  .glow {
    box-shadow: 0 0 25px 8px rgba(0, 255, 0, 0.7);
    border-radius: 12px;
  }

  #message {
    margin-top: 40px;
    font-size: 32px;
    font-weight: bold;
    color: #0a7a0a;
    display: none;
  }

  #restartBtn {
    margin-top: 25px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    background: #0077cc;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    display: none;
  }

  #restartBtn:hover {
    background: #005fa3;
  }
</style>
</head>
<body>

<div id="intro">Welcome</div>

<h2>Select the correct card</h2>

<div class="cards">
  <div class="card" data-id="1">
    <div class="card-inner">
      <div class="card-front" style="--card-color:red"></div>
      <div class="card-back"></div>
    </div>
  </div>

  <div class="card" data-id="2">
    <div class="card-inner">
      <div class="card-front" style="--card-color:blue"></div>
      <div class="card-back"></div>
    </div>
  </div>

  <div class="card" data-id="3">
    <div class="card-inner">
      <div class="card-front" style="--card-color:green"></div>
      <div class="card-back"></div>
    </div>
  </div>

  <div class="card" data-id="4">
    <div class="card-inner">
      <div class="card-front" style="--card-color:orange"></div>
      <div class="card-back"></div>
    </div>
  </div>

  <div class="card" data-id="5">
    <div class="card-inner">
      <div class="card-front" style="--card-color:purple"></div>
      <div class="card-back"></div>
    </div>
  </div>

  <div class="card" data-id="6">
    <div class="card-inner">
      <div class="card-front" style="--card-color:yellow"></div>
      <div class="card-back"></div>
    </div>
  </div>
</div>

<div id="message">You have chosen correctly, the player that your company is missing</div>

<button id="restartBtn" onclick="restartGame()">Restart Game</button>

<script>
  const cards = document.querySelectorAll('.card');
  const message = document.getElementById('message');
  const restartBtn = document.getElementById('restartBtn');

  // Remove intro screen after fade-in
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
  }, 2000);

  // Retrieve last correct card
  const lastCorrect = Number(localStorage.getItem("lastCorrectCard"));

  // Generate a new correct card that is NOT the same as last time
  let correctCard;
  do {
    correctCard = Math.floor(Math.random() * 6) + 1;
  } while (correctCard === lastCorrect);

  // Save new correct card
  localStorage.setItem("lastCorrectCard", correctCard);

  let locked = false;

  // REAL SHUFFLE (no shaking)
  const container = document.querySelector(".cards");
  const cardArray = Array.from(cards);

  setTimeout(() => {
    const shuffled = cardArray
      .map(card => ({ card, sort: Math.random() }))
      .sort((a, b) => a.sort - b.sort)
      .map(obj => obj.card);

    shuffled.forEach(card => container.appendChild(card));
  }, 800);

  cards.forEach(card => {
    card.addEventListener('click', () => {
      if (locked) return;

      const id = Number(card.getAttribute('data-id'));
      const back = card.querySelector('.card-back');

      card.classList.add('flipped');

      if (id === correctCard) {
        locked = true;

        setTimeout(() => {
          card.classList.add('glow');
          message.style.display = 'block';
          restartBtn.style.display = 'inline-block';
        }, 600);

        setTimeout(() => {
          window.open("https://www.linkedin.com/in/adrian-garcia-3b3b26a3/", "_blank");
        }, 3000);

      } else {
        back.textContent = '✖';

        setTimeout(() => {
          card.classList.remove('flipped');
          back.textContent = '';
        }, 1200);
      }
    });
  });

  function restartGame() {
    location.reload();
  }
</script>

</body>
</html>
