<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find the Right Key</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #ffffff;
    --border: #d1d5db;
    --accent: #2563eb;
    --text: #1f2937;
    --muted: #6b7280;
    --door: #e5e7eb;
    --door-edge: #cbd5e1;
    --key1: #9ca3af;
    --key2: #fbbf24;
    --key3: #3b82f6;
  }

  body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    color: var(--text);
    user-select: none;
  }

  #wrapper {
    width: 760px;
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }

  #game-area {
    height: 260px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: linear-gradient(to bottom, #f8fafc, #eef2f7);
    position: relative;
    overflow: hidden;
  }

  /* DOOR */
  #door-container {
    position: absolute;
    top: 40px;
    left: 380px;
    width: 140px;
    height: 200px;
    transform-origin: left center;
    transition: transform 1.2s ease-out;
  }

  #door-container.open {
    transform: perspective(600px) rotateY(-85deg);
  }

  /* BIG SUCCESS MESSAGE */
  #big-success {
    position: absolute;
    top: 42%;
    left: 62%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    font-weight: 800;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.6s ease-out;
    text-align: center;
    pointer-events: none;
    line-height: 1.3;
    z-index: 0;
  }

  #big-success.show {
    opacity: 1;
  }

  /* DRAGGABLE KEYS */
  .key {
    position: absolute;
    width: 120px;
    height: 40px;
    cursor: grab;
    transition: opacity 0.2s ease-out;
  }

  .key.used {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #key1 { top: 70px; left: 60px; }
  #key2 { top: 135px; left: 60px; }
  #key3 { top: 200px; left: 60px; }

  #message {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div id="wrapper">

  <div id="big-success">You found the key for your company!</div>

  <div id="game-area">

    <!-- DOOR (HTML container with SVG inside) -->
    <div id="door-container">
      <svg width="140" height="200">
