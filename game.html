<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Flip Game</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
        padding-top: 40px;
    }

    h2 {
        margin-bottom: 20px;
    }

    .cards {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        width: 120px;
        height: 180px;
        perspective: 1000px;
        cursor: pointer;
    }

    .inner {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.6s;
        transform-style: preserve-3d;
    }

    .flipped {
        transform: rotateY(180deg);
    }

    .glow {
        box-shadow: 0 0 25px 8px rgba(0, 255, 0, 0.7);
        border-radius: 12px;
    }

    .front, .back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 70px;
        font-weight: bold;
    }

    /* FRONT shows the color */
    .front {
        background: var(--card-color);
    }

    /* BACK shows X or stays blank */
    .back {
        background: white;
        transform: rotateY(180deg);
        color: red;
    }

    /* Shuffle animation */
    @keyframes shuffle {
        0% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-10px) rotate(-150deg); }
        50% { transform: translateX(10px) rotate(5deg); }
        75% { transform: translateX(-5px) rotate(-150deg); }
