<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Key That Doesn't Fit</title>
<style>
  body {
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  #game {
    position: relative;
    width: 600px;
    height: 300px;
    border: 2px solid #444;
    background: #222;
  }
  #door {
    position: absolute;
    right: 80px;
    top: 50px;
    width: 120px;
    height: 200px;
    background: #6b4f2a;
    border-radius: 4px;
  }
  #lock {
    position: absolute;
    right: 20px;
    top: 130px;
    width: 20px;
    height: 40px;
    background: #ccc;
    border-radius: 5px;
  }
  #key {
    position: absolute;
    left: 40px;
    top: 140px;
    width: 80px;
    height: 20px;
    background: gold;
    border-radius: 10px;
    cursor: grab;
  }
  #message {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="game">
  <div id="door"></div>
  <div id="lock"></div>
  <div id="key"></div>
  <div id="message">Drag the key toward the lock...</div>
</div>

<script>
  const key = document.getElementById('key');
  const lock = document.getElementById('lock');
  const msg = document.getElementById('message');

  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  key.addEventListener('mousedown', (e) => {
    dragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    key.style.cursor = 'grabbing';
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    key.style.cursor = 'grab';
    checkCollision();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = key.parentElement.getBoundingClientRect();
    const x = e.clientX - rect.left - offsetX;
    const y = e.clientY - rect.top - offsetY;
    key.style.left = x + 'px';
    key.style.top = y + 'px';
  });

  function checkCollision() {
    const keyRect = key.getBoundingClientRect();
    const lockRect = lock.getBoundingClientRect();

    const overlap =
      keyRect.right > lockRect.left &&
      keyRect.left < lockRect.right &&
      keyRect.bottom > lockRect.top &&
      keyRect.top < lockRect.bottom;

    if (overlap) {
      msg.textContent = "The key doesn't fit... maybe it's the wrong one.";
      key.style.left = (parseInt(key.style.left) - 20) + 'px';
    } else {
      msg.textContent = "Drag the key toward the lock...";
    }
  }
</script>
</body>
</html>
